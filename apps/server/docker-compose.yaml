version: '3.8'

name: alatere

services:
  postgresql:
    image: postgres:17
    container_name: alatere-postgres17
    environment:
      POSTGRES_USER: alatere
      POSTGRES_PASSWORD: alatere
      POSTGRES_DB: alatere
    command: ['postgres', '-c', 'max_connections=200']
    ports:
      - '54321:5432'
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - alatere
    restart: unless-stopped

volumes:
  pg_data:

networks:
  alatere:
    driver: bridge
